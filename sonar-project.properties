# ═══════════════════════════════════════════════════════════
#   SonarQube Configuration
#   Yeh file SonarQube ko batati hai project kaise scan karna hai
# ═══════════════════════════════════════════════════════════

# Project basic info
sonar.projectKey=expensio-expense-tracker
sonar.projectName=Expensio Expense Tracker
sonar.projectVersion=1.0.0

# Source code location
sonar.sources=backend,frontend

# Test files location
sonar.tests=backend

# Exclude these from scanning
sonar.exclusions=**/node_modules/**,**/coverage/**,**/*.test.js,**/test-results.xml

# Test coverage report
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
